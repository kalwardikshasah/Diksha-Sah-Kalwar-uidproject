<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body{
  font-family:Poppins;
  background:#fff0f5;
  text-align:center;
  padding:50px;
}

button{
  padding:12px 20px;
  background:#ff4081;
  color:white;
  border:none;
  border-radius:20px;
}
</style>
</head>

<body>

<h2>💳 Payment</h2>
<p>Total Amount: ₹<span id="amount"></span></p>

<button onclick="pay()">Pay Now</button>

<script>
let total = localStorage.getItem("total");
document.getElementById("amount").innerText = total;

function pay(){
  alert("Payment Successful 🎉");

  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.push("Order of ₹" + total);

  localStorage.setItem("orders", JSON.stringify(orders));

  localStorage.removeItem("cart");

  window.location.href="orders.html";
}
</script>

</body>
</html>
