<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Bloomify | Secure Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #fef9f9 0%, #fff0f5 100%);
      color: #1e1e2a;
      line-height: 1.4;
    }

    /* HEADER premium */
    header {
      padding: 20px 48px;
      font-size: 1.7rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
      border-bottom: 1px solid rgba(255, 64, 129, 0.2);
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header i {
      color: #ff4081;
      font-size: 1.9rem;
    }
    header span {
      background: linear-gradient(135deg, #ff4081, #ff80ab);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* MAIN LAYOUT */
    .container {
      display: flex;
      gap: 32px;
      padding: 48px 48px 60px;
      flex-wrap: wrap;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* FORM CARD */
    .form {
      flex: 2;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(0px);
      padding: 32px;
      border-radius: 32px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(255, 64, 129, 0.08);
      transition: all 0.2s ease;
    }

    .form h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1f1f2b;
      letter-spacing: -0.2px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 4px solid #ff4081;
      padding-left: 16px;
    }
    .form h2:first-of-type {
      margin-top: 0;
    }
    .form h2:not(:first-of-type) {
      margin-top: 28px;
    }

    /* INPUT GROUP modern */
    .input-group {
      position: relative;
      margin: 24px 0 20px;
    }
    .input-group input {
      width: 100%;
      padding: 16px 16px 8px 16px;
      border-radius: 18px;
      border: 1.5px solid #e9eef2;
      background: white;
      outline: none;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      font-weight: 500;
    }
    .input-group input:focus {
      border-color: #ff4081;
      box-shadow: 0 0 0 3px rgba(255, 64, 129, 0.15);
    }
    .input-group label {
      position: absolute;
      top: 15px;
      left: 16px;
      color: #8e8e9e;
      font-size: 0.95rem;
      font-weight: 500;
      transition: 0.2s ease;
      pointer-events: none;
      background: white;
      padding: 0 5px;
    }
    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: -8px;
      font-size: 0.75rem;
      color: #ff4081;
      font-weight: 600;
      background: white;
    }

    /* SELECT modern */
    .payment-selector {
      margin-top: 12px;
    }
    .styled-select {
      position: relative;
      width: 100%;
    }
    .styled-select select {
      width: 100%;
      padding: 14px 18px;
      border-radius: 28px;
      border: 1.5px solid #e9eef2;
      background: white;
      font-size: 1rem;
      font-weight: 500;
      color: #1e1e2a;
      cursor: pointer;
      appearance: none;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .styled-select select:focus {
      border-color: #ff4081;
      outline: none;
      box-shadow: 0 0 0 2px rgba(255, 64, 129, 0.2);
    }
    .styled-select i {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #ff4081;
      pointer-events: none;
    }

    /* PAYMENT MODAL (UPI / CARD) PROFESSIONAL */
    .payment-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      font-family: 'Inter', sans-serif;
    }
    .modal-card {
      background: white;
      width: 90%;
      max-width: 480px;
      border-radius: 40px;
      padding: 28px 28px 36px;
      box-shadow: 0 40px 60px rgba(0, 0, 0, 0.2);
      animation: slideUp 0.25s ease;
      transition: all 0.2s;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-weight: 700;
      font-size: 1.5rem;
      color: #1e1e2a;
    }
    .modal-header i {
      cursor: pointer;
      color: #8e8e9e;
      transition: 0.2s;
      font-size: 1.5rem;
    }
    .modal-header i:hover {
      color: #ff4081;
    }
    .payment-detail {
      margin: 20px 0;
    }
    .payment-detail label {
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #5a5a6e;
      display: block;
      margin-bottom: 8px;
    }
    .payment-detail input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 28px;
      border: 1.5px solid #e2e6ea;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
    }
    .payment-detail input:focus {
      border-color: #ff4081;
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 64, 129, 0.1);
    }
    .row-2col {
      display: flex;
      gap: 12px;
    }
    .row-2col > div {
      flex: 1;
    }
    .pay-now-btn {
      background: linear-gradient(105deg, #ff4081, #ff668e);
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.2s;
    }
    .pay-now-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 18px rgba(255, 64, 129, 0.3);
    }
    .upi-note {
      background: #f7f3ff;
      border-radius: 20px;
      padding: 12px;
      font-size: 0.8rem;
      color: #6c5ce7;
      text-align: center;
    }

    /* BUTTON primary */
    .btn-primary {
      margin-top: 28px;
      width: 100%;
      padding: 16px;
      border: none;
      background: linear-gradient(95deg, #ff4081, #ff7aa2);
      color: white;
      font-size: 1.05rem;
      font-weight: 700;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      letter-spacing: 0.3px;
      box-shadow: 0 6px 14px rgba(255, 64, 129, 0.25);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(255, 64, 129, 0.35);
    }

    /* SUMMARY CARD premium */
    .summary {
      flex: 1;
      background: white;
      padding: 28px;
      border-radius: 32px;
      height: fit-content;
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(255, 64, 129, 0.15);
      position: sticky;
      top: 100px;
    }
    .summary h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px dashed #ffecf0;
      padding-bottom: 12px;
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      margin: 12px 0;
      font-size: 1rem;
    }
    .total-row {
      border-top: 2px solid #ffecf0;
      margin-top: 18px;
      padding-top: 16px;
      font-weight: 800;
      font-size: 1.6rem;
      color: #ff4081;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .total-label {
      font-size: 1rem;
      font-weight: 600;
      color: #2d2d3a;
    }

    @media (max-width: 780px) {
      .container {
        padding: 24px;
      }
      header {
        padding: 14px 24px;
      }
    }
    .badge-item {
      background: #fce4ec;
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    small {
      color: #6c6c7e;
    }
  </style>
</head>
<body>

<header>
  <i class="fas fa-lock"></i>
  <span>Bloomify</span> · Secure Checkout
</header>

<div class="container">
  <!-- LEFT FORM (shipping + payment method) -->
  <div class="form">
    <h2><i class="fas fa-truck-fast"></i> Shipping Details</h2>

    <div class="input-group">
      <input type="text" id="name" placeholder=" " autocomplete="name" />
      <label>Full Name</label>
    </div>

    <div class="input-group">
      <input type="tel" id="phone" placeholder=" " autocomplete="tel" />
      <label>Phone Number</label>
    </div>

    <div class="input-group">
      <input type="text" id="address" placeholder=" " autocomplete="street-address" />
      <label>Address</label>
    </div>

    <div class="input-group">
      <input type="text" id="city" placeholder=" " autocomplete="address-level2" />
      <label>City</label>
    </div>

    <div class="input-group">
      <input type="text" id="pincode" placeholder=" " autocomplete="postal-code" />
      <label>Pincode</label>
    </div>

    <h2><i class="fas fa-credit-card"></i> Payment Method</h2>
    <div class="payment-selector styled-select">
      <select id="payment">
        <option value="cod">Cash on Delivery</option>
        <option value="upi">UPI (Google Pay / PhonePe)</option>
        <option value="card">Credit / Debit Card</option>
      </select>
      <i class="fas fa-chevron-down"></i>
    </div>

    <button class="btn-primary" onclick="initiateOrder()">
      <i class="fas fa-shield-alt"></i> Place Order
    </button>
  </div>

  <!-- RIGHT SUMMARY -->
  <div class="summary">
    <h3><i class="fas fa-bag-shopping"></i> Order Summary</h3>
    <div class="summary-item">
      <span>Total Items</span>
      <span><strong id="items">0</strong></span>
    </div>
    <div class="total-row">
      <span class="total-label">Grand Total</span>
      <span>₹<span id="price">0</span></span>
    </div>
    <small style="display: block; margin-top: 12px;"><i class="fas fa-check-circle"></i> Free delivery on all orders</small>
  </div>
</div>

<!-- MODAL for UPI / CARD (dynamic professional gateway) -->
<div id="paymentModal" class="payment-modal">
  <div class="modal-card" id="modalContent">
    <!-- dynamic content injected via JS -->
  </div>
</div>

<script>
  // ---------- LOAD CART DATA ----------
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let totalAmount = 0;

  function updateSummary() {
    totalAmount = 0;
    cart.forEach(item => {
      const qty = item.qty || 1;
      const price = item.price || 0;
      totalAmount += price * qty;
    });
    document.getElementById("items").innerText = cart.length;
    document.getElementById("price").innerText = Math.round(totalAmount);
  }
  updateSummary();

  // ---------- helper: validate shipping ----------
  function validateShipping() {
    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let address = document.getElementById("address").value.trim();
    let city = document.getElementById("city").value.trim();
    let pincode = document.getElementById("pincode").value.trim();

    if (!name || !phone || !address || !city || !pincode) {
      alert("❌ Please fill all shipping details.");
      return false;
    }
    if (!/^\d{6}$/.test(pincode)) {
      alert("📮 Please enter a valid 6-digit pincode.");
      return false;
    }
    if (!/^\d{10}$/.test(phone) && !/^\d{7,15}$/.test(phone)) {
      if (!confirm("Phone number should be 10 digits. Continue anyway?")) return false;
    }
    return true;
  }

  // ---------- PROFESSIONAL PAYMENT MODAL LOGIC (UPI & CARD) ----------
  let activePaymentMethod = null;
  let modalResolve = null;    // promise resolver for payment flow

  function showPaymentModal(method, orderDetails) {
    return new Promise((resolve) => {
      modalResolve = resolve;
      const modal = document.getElementById("paymentModal");
      const modalContentDiv = document.getElementById("modalContent");
      activePaymentMethod = method;

      if (method === "upi") {
        modalContentDiv.innerHTML = `
          <div class="modal-header">
            <span><i class="fab fa-google-pay"></i>  UPI Payment</span>
            <i class="fas fa-times" id="closeModalBtn"></i>
          </div>
          <div class="upi-note">
            <i class="fas fa-mobile-alt"></i> Simulated gateway • Demo mode
          </div>
          <div class="payment-detail">
            <label>UPI ID / VPA</label>
            <input type="text" id="upiId" placeholder="yourname@okhdfcbank" value="demo@bloomify">
          </div>
          <div class="payment-detail">
            <label>Amount to Pay</label>
            <input type="text" readonly value="₹ ${Math.round(totalAmount)}" style="background:#f5f5f5; font-weight:600;">
          </div>
          <button class="pay-now-btn" id="confirmUpiBtn"><i class="fas fa-arrow-right"></i> Pay ₹${Math.round(totalAmount)}</button>
        `;
      } 
      else if (method === "card") {
        modalContentDiv.innerHTML = `
          <div class="modal-header">
            <span><i class="fas fa-credit-card"></i>  Card Payment</span>
            <i class="fas fa-times" id="closeModalBtn"></i>
          </div>
          <div class="payment-detail">
            <label>Card Number</label>
            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
          </div>
          <div class="row-2col">
            <div>
              <label>Expiry (MM/YY)</label>
              <input type="text" id="expiry" placeholder="MM/YY">
            </div>
            <div>
              <label>CVV</label>
              <input type="password" id="cvv" placeholder="***" maxlength="4">
            </div>
          </div>
          <div class="payment-detail">
            <label>Cardholder Name</label>
            <input type="text" id="cardName" placeholder="Name on card">
          </div>
          <button class="pay-now-btn" id="confirmCardBtn">Pay ₹${Math.round(totalAmount)}</button>
          <small style="display:block; margin-top:12px; text-align:center;">🔒 Test: 4111 1111 1111 1111 | any future date</small>
        `;
      }

      modal.style.display = "flex";

      // close modal X
      const closeBtn = document.getElementById("closeModalBtn");
      if (closeBtn) closeBtn.onclick = () => {
        modal.style.display = "none";
        resolve(false);
        modalResolve = null;
      };

      // event listeners for payment confirmation
      if (method === "upi") {
        const confirmBtn = document.getElementById("confirmUpiBtn");
        if (confirmBtn) {
          confirmBtn.onclick = () => {
            const upiId = document.getElementById("upiId")?.value.trim();
            if (!upiId) {
              alert("Please enter a valid UPI ID");
              return;
            }
            // Simulate payment success
            modal.style.display = "none";
            resolve(true);
            modalResolve = null;
          };
        }
      } 
      else if (method === "card") {
        const confirmCard = document.getElementById("confirmCardBtn");
        if (confirmCard) {
          confirmCard.onclick = () => {
            let cardNum = document.getElementById("cardNumber")?.value.replace(/\s/g, '');
            let expiry = document.getElementById("expiry")?.value.trim();
            let cvv = document.getElementById("cvv")?.value.trim();
            let cardName = document.getElementById("cardName")?.value.trim();
            if (!cardNum || !expiry || !cvv || !cardName) {
              alert("❌ Please fill all card details");
              return;
            }
            if (!/^\d{13,19}$/.test(cardNum)) {
              alert("Invalid card number (13-19 digits)");
              return;
            }
            if (!/^\d{2}\/\d{2}$/.test(expiry)) {
              alert("Expiry format MM/YY");
              return;
            }
            if (!/^\d{3,4}$/.test(cvv)) {
              alert("CVV should be 3-4 digits");
              return;
            }
            // success simulation
            modal.style.display = "none";
            resolve(true);
            modalResolve = null;
          };
        }
      }

      // click outside close (optional)
      modal.onclick = (e) => {
        if (e.target === modal) {
          modal.style.display = "none";
          resolve(false);
          modalResolve = null;
        }
      };
    });
  }

  // ---------- MAIN ORDER PLACEMENT LOGIC (supports COD, UPI, CARD with professional modal) ----------
  async function initiateOrder() {
    // validate shipping fields
    if (!validateShipping()) return;

    if (cart.length === 0) {
      alert("🛒 Your cart is empty! Please add items before checkout.");
      return;
    }

    const paymentSelect = document.getElementById("payment");
    const selectedMethod = paymentSelect.value;  // "cod", "upi", "card"
    let paymentSuccess = false;

    // Cash on delivery: immediate success
    if (selectedMethod === "cod") {
      paymentSuccess = true;
    } 
    else if (selectedMethod === "upi") {
      // show professional UPI modal
      const orderSnapshot = { total: totalAmount };
      const modalResult = await showPaymentModal("upi", orderSnapshot);
      if (!modalResult) {
        alert("⛔ UPI payment cancelled.");
        return;
      }
      paymentSuccess = true;
    } 
    else if (selectedMethod === "card") {
      const orderSnapshot = { total: totalAmount };
      const modalResult = await showPaymentModal("card", orderSnapshot);
      if (!modalResult) {
        alert("💳 Card payment declined or cancelled.");
        return;
      }
      paymentSuccess = true;
    }

    if (!paymentSuccess) return;

    // ----- COLLECT FINAL ORDER -----
    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let address = document.getElementById("address").value.trim();
    let city = document.getElementById("city").value.trim();
    let pincode = document.getElementById("pincode").value.trim();

    let order = {
      orderId: "ORD" + Math.floor(Date.now() / 1000) + Math.random().toString(36).substr(2, 4).toUpperCase(),
      date: new Date().toLocaleString(),
      name, phone, address, city, pincode,
      items: cart,
      total: totalAmount,
      paymentMethod: paymentSelect.options[paymentSelect.selectedIndex]?.text || "Cash on Delivery"
    };

    localStorage.setItem("lastOrder", JSON.stringify(order));
    localStorage.removeItem("cart");

    // optional: show success toast before redirect
    window.location.href = "success.html";
  }

  // extra: add dynamic card formatting (optional UX)
  document.addEventListener("DOMContentLoaded", () => {
    // subtle auto-format card number if exists later (just for better ux)
    const paymentSelect = document.getElementById("payment");
    if(paymentSelect) {
      paymentSelect.style.cursor = "pointer";
    }
    // set placeholder attributes for better floating labels
    const inputs = document.querySelectorAll(".input-group input");
    inputs.forEach(inp => {
      if(!inp.getAttribute("placeholder")) inp.setAttribute("placeholder", " ");
    });
  });
</script>
</body>
</html>
