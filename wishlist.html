<!DOCTYPE html>
<html>
<head>
<title>My Wishlist - Bloomify</title>

<style>
body{
  font-family:Poppins;
  margin:0;
  background:#f6f6f6;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
  font-weight:bold;
  font-size:20px;
  color:#ff4081;
}

/* TITLE */
h1{
  text-align:center;
  margin:30px 0;
  color:#333;
}

/* CONTAINER */
.products{
  padding:20px;
}

/* CARD (ROW STYLE ✅) */
.card{
  display:flex;
  align-items:center;
  gap:20px;
  background:white;
  border-radius:18px;
  padding:15px;
  margin-bottom:20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
  position:relative;
}

/* IMAGE (LEFT SIDE ✅) */
.card img{
  width:110px;
  height:110px;
  border-radius:12px;
  object-fit:cover;
}

/* CONTENT */
.content{
  flex:1;
}

.content h3{
  margin:0;
}

.price{
  color:#ff4081;
  font-weight:bold;
  margin:5px 0;
}

/* REMOVE BUTTON (RIGHT TOP) */
.remove{
  position:absolute;
  top:12px;
  right:15px;
  cursor:pointer;
  font-size:18px;
  color:#888;
}

.remove:hover{
  color:#ff4081;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.cart{
  background:#ff4081;
  color:white;
}

.move{
  background:#eee;
}

/* EMPTY */
.empty{
  text-align:center;
  margin-top:120px;
  color:#777;
}
</style>
</head>

<body>

<header>
  <div class="logo">🌸 Bloomify</div>
</header>

<h1>My Wishlist</h1>

<div class="products" id="wishlistContainer"></div>

<script>
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let container = document.getElementById("wishlistContainer");

// DISPLAY
function displayWishlist(){
  container.innerHTML = "";

  if(wishlist.length === 0){
    container.innerHTML = "<div class='empty'><h2>Your Wishlist is Empty</h2><p>Add items you love ❤️</p></div>";
    return;
  }

  wishlist.forEach((item, index)=>{
    container.innerHTML += `
      <div class="card">
        
        <span class="remove" onclick="removeItem(${index})">✖</span>

        <img src="${item.image}">

        <div class="content">
          <h3>${item.name}</h3>
          <p class="price">₹${item.price}</p>

          <div class="buttons">
            <button class="cart" onclick="addToCart('${item.name}',${item.price},'${item.image}')">Add to Cart</button>
            <button class="move" onclick="moveToCart(${index})">Remove</button>
          </div>
        </div>

      </div>
    `;
  });
}

// REMOVE
function removeItem(index){
  wishlist.splice(index,1);
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
  displayWishlist();
}

// MOVE TO CART
function moveToCart(index){
  let item = wishlist[index];
  addToCart(item.name, item.price, item.image);
  removeItem(index);
}

// ADD TO CART
function addToCart(name, price, image){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let existing = cart.find(item => item.name === name);

  if(existing){
    existing.qty = (existing.qty || 1) + 1;
  }else{
    cart.push({name, price, image, qty:1});
  }

  localStorage.setItem("cart", JSON.stringify(cart));
}

// LOAD
displayWishlist();
</script>

</body>
</html>
